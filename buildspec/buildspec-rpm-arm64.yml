version: 0.2
# ─────────────────────────────────────────────────────────────────────────────
# Mydbops CodeBuild Buildspec — RPM aarch64 → .rpm packages
# Target: EPEL 8/9 on aarch64 (no Fedora arm64)
# All build logic lives in build-package.sh — do not add logic here.
# ─────────────────────────────────────────────────────────────────────────────

env:
  parameter-store:
    S3_BUCKET:      /mydbops/cicd/build/S3_BUCKET
    ECR_ACCOUNT_ID: /mydbops/cicd/ecr/account_id
    ECR_REGION:     /mydbops/cicd/ecr/region
  secrets-manager:
    GPG_PRIVATE_KEY: mydbops/cicd/gpg-signing-key-1

phases:
  install:
    commands:
      # Curl is already bundled in amazon linux
      - yum install -y docker python3 python3-pyyaml jq

  pre_build:
    commands:
      - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - timeout 15 sh -c "until docker info; do echo Waiting for Docker...; sleep 1; done"
      # Pin packages_source to the exact tagged commit (FULL_CLONE required).
      - git -C "$CODEBUILD_SRC_DIR_packages_source" fetch --tags origin
      - git -C "$CODEBUILD_SRC_DIR_packages_source" checkout "$GIT_TAG"
      - aws ecr get-login-password --region "$ECR_REGION" | docker login --username AWS --password-stdin "${ECR_ACCOUNT_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com"

  build:
    commands:
      - |
        PLATFORM_DIR="$CODEBUILD_SRC_DIR"
        PACKAGES_DIR="$CODEBUILD_SRC_DIR_packages_source"
        "$PLATFORM_DIR/scripts/build-package.sh" \
          --package      "$PACKAGE_NAME" \
          --packages-dir "$PACKAGES_DIR" \
          --s3-bucket    "$S3_BUCKET" \
          --env          "$BUILD_ENV" \
          --os           epel \
          --arch         aarch64
