version: 0.2
# ─────────────────────────────────────────────────────────────────────────────
# Mydbops CodeBuild Buildspec — Ubuntu x86_64 (amd64) → .deb packages
# Target: Ubuntu 20/22/24 on x86_64
# Calls build-package.sh which reads build.yml for enabled targets.
# All build logic lives in build-package.sh — do not add logic here.
# ─────────────────────────────────────────────────────────────────────────────

env:
  # PACKAGE_NAME, PACKAGE_VERSION, PACKAGE_REVISION, PG_MAJOR, IS_RC, BUILD_ENV
  # are injected by the pipeline as EnvironmentVariables from #{ParseTag.*}.
  # Reading them from SSM would cause race conditions when multiple PG pipelines
  # run concurrently (they share the same SSM paths).
  parameter-store:
    S3_BUCKET:      /mydbops/cicd/build/S3_BUCKET
    ECR_ACCOUNT_ID: /mydbops/cicd/ecr/account_id
    ECR_REGION:     /mydbops/cicd/ecr/region
  secrets-manager:
    GPG_PRIVATE_KEY: mydbops/cicd/gpg-signing-key-1

phases:
  install:
    commands:
      - apt-get update -qq
      - apt-get install -y -qq docker.io python3 python3-yaml jq curl awscli

  pre_build:
    commands:
      # Pin packages_source to the exact tagged commit (FULL_CLONE required).
      # Prevents branch drift if the branch advances after the tag is pushed.
      - git -C "$CODEBUILD_SRC_DIR_packages_source" checkout "$GIT_TAG"
      - aws ecr get-login-password --region "$ECR_REGION" | docker login --username AWS --password-stdin "${ECR_ACCOUNT_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com"

  build:
    commands:
      - |
        PLATFORM_DIR="$CODEBUILD_SRC_DIR"
        PACKAGES_DIR="$CODEBUILD_SRC_DIR_packages_source"
        "$PLATFORM_DIR/scripts/build-package.sh" \
          --package      "$PACKAGE_NAME" \
          --packages-dir "$PACKAGES_DIR" \
          --s3-bucket    "$S3_BUCKET" \
          --env          "$BUILD_ENV" \
          --os           ubuntu \
          --arch         amd64
