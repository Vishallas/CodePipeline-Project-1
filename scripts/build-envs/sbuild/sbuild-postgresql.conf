# ─────────────────────────────────────────────────────────────────────────
# sbuild configuration for PostgreSQL package building
# ─────────────────────────────────────────────────────────────────────────

# Build architecture settings
$build_arch_all = 1;              # Build architecture-independent packages
$build_arch = 1;                   # Build architecture-dependent packages
$build_source = 1;                 # Build source packages

# Parallelization settings
# These are overridden by environment: MAKEFLAGS, DEB_BUILD_OPTIONS
$ENV{MAKEFLAGS} = '-j' . ($ENV{SBUILD_JOBS} // 4);
$ENV{DEB_BUILD_OPTIONS} = 'parallel=' . ($ENV{SBUILD_JOBS} // 4);

# Logging verbosity
$verbose = 0;
$debug = 0;
$log_external_command_output = 0;

# Build identity
$maintainer_name = 'PostgreSQL Packager';
$maintainer_email = 'packaging@postgresql.local';
$uploader_name = 'PostgreSQL Packager';
$uploader_email = 'packaging@postgresql.local';

# GPG signing (set to 'E' + KEY_ID if signing packages)
$sign_with = undef;
$key_id = undef;

# APT configuration
$apt_program = '/usr/bin/apt-get';
$apt_options = [
    '-y',
    '-o', 'APT::Install-Recommends=false',
    '-o', 'APT::Install-Suggests=false',
    '-o', 'Apt::Get::AllowUnauthenticated=true'
];

# Build path
$build_path = '/build';

# Chroot paths
$chroot_setup_script = '/etc/sbuild/setup-chroot-postgresql';
$chroot_cleanup_script = '/etc/sbuild/cleanup-chroot-postgresql';

# Compiler optimizations for PostgreSQL
$ENV{CFLAGS} = '-O2 -march=x86-64 -mtune=generic -fstack-protector-strong -Wformat -Werror=format-security';
$ENV{CXXFLAGS} = '-O2 -march=x86-64 -mtune=generic -fstack-protector-strong -Wformat -Werror=format-security';
$ENV{LDFLAGS} = '-Wl,-O1 -Wl,--as-needed -Wl,-z,relro -Wl,-z,now';

# PostgreSQL-specific environment
$ENV{PGVERSION} = $ENV{PG_MAJOR} // '17';

# Performance enhancements
$use_ccache = 1 if -d '/var/cache/ccache-sbuild';
$ccache_dir = '/var/cache/ccache-sbuild';
$eatmydata = 1 if -x '/usr/bin/eatmydata';

# Timeout settings (PostgreSQL builds can take time)
$stalled_pkg_timeout = 200;       # Longer timeout for PostgreSQL builds
$max_overall_build_time = 7200;   # 2 hours max

# Build quality checks
$run_lintian = 1;
$lintian_opts = ['-i', '-E', '--pedantic'];
$run_autopkgtest = 0;
$run_piuparts = 0;

# Package cleaning
$apt_clean = 1;
$apt_distupgrade = 1;
$check_space_before_build = 1;

# Build lock file
$lock_build_log = 1;

# Root command - use fakeroot
$rootcmd = '/usr/bin/fakeroot';

# Architecture detection
$arch = (defined $ENV{SBUILD_ARCH}) ? $ENV{SBUILD_ARCH} : 'amd64';

# Build source if available
$build_source = 1;
$build_arch = 1;
$build_arch_all = 1;

# Network access (set to 1 if needed for network-dependent builds)
$sbuild_mode = 'buildd';
