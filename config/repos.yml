# config/repos.yml — Repository infrastructure configuration
# Sensitive values (passwords, keys) reference AWS Secrets Manager secrets,
# not stored here in plaintext.

s3:
  # Bucket for build artifacts (packages, sha256 sidecars)
  artifacts_bucket: mydbops-cicd-artifacts
  # Bucket serving the APT repository (can be same as artifacts_bucket)
  apt_bucket: mydbops-cicd-artifacts
  # Bucket serving the YUM repository
  yum_bucket: mydbops-cicd-artifacts

ecr:
  account_id: ""          # Set via SSM /mydbops/cicd/ecr/account_id
  region: ap-south-1
  repository: mydbops/pg-build

pulp:
  # Leave url empty to disable Pulp integration entirely
  url: ""
  password_secret: mydbops/cicd/pulp-password

gpg:
  key_id: ""              # Set via SSM /mydbops/cicd/gpg/key_id
  key_secret: mydbops/cicd/gpg-signing-key   # Secrets Manager secret name

cloudfront:
  distribution_id: ""     # Set via SSM /mydbops/cicd/cloudfront/distribution_id
